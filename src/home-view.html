<link rel="import" href="../bower_components/polymer/polymer.html">
<link rel="import" href="../bower_components/app-layout/app-grid/app-grid-style.html">
<link rel="import" href="../bower_components/paper-styles/typography.html">
<link rel="import" href="../bower_components/paper-icon-button/paper-icon-button.html">
<link rel="import" href="../bower_components/iron-icons/iron-icons.html">
<link rel="import" href="../bower_components/paper-material/paper-material.html">
<link rel="import" href="../bower_components/paper-card/paper-card.html">
<link rel="import" href="theme.html">


<dom-module id="home-view">
  <template>
    <style include="app-grid-style">
      :host {
        display: block;
        @apply(--paper-font-common-base);
        --app-grid-columns: 3;
        --app-grid-gutter: 10px;
        --app-grid-expandible-item-columns: 3;
        background-color: var(--primary-background-color);
      }

      body {
        @apply(--paper-font-common-base);
        color : var(--primary-text-color);
        background-color: var(--primary-color);
      }
      paper-material {
        background-color: var(--elevation-1-background-color);
        color: var(--primary-text-color);
        padding-left: 16px;
        padding-right: 16px;
        padding-top: 24px;
        padding-bottom: 24px;
      }
      paper-card {
        background-color: var(--elevation-1-background-color);
      }

      .big-item {
        @apply(--app-grid-expandible-item);
      }
      @media (max-width: 799px) {
        :host {
          --app-grid-columns: 2;
          --app-grid-gutter: 5px;
          --app-grid-expandible-item-columns: 2;
        }
    }
    </style>
    <div class="app-grid">
      <paper-material class="big-item" elevation="0">
        <p align="justifiy">
          Louis hails from Toulouse, South of France. He's currently completing a double degree with the Ecole Superieur d'Ingenieur Leonard de Vinci and the University of Quebec at Chicoutimi. He worked a lot in the student organisation he created, Veni Vidi De Vinci to make it one of the major organisation for every new student of his school. He also worked as a developer intern for E-Deal during few months before crossing the Atlantic to continue his studies at the University of Quebec at Chicoutimi. He's now looking for an awesome internship in Canada, if you find it, please <a href="#todo">contact him<a>, he doesn't bite !
        </p>
      </paper-material>
      <!--TODO Implement random abstract -->
      </paper-material>
    </div>
  </template>

  <script>
    Polymer({

      is: 'home-view',
      properties: {
        pageTitle: {
          type: String,
          value: 'Home',
          readOnly: true
        }
      },
      attached: function () {
        this.currentTitle=this.pageTitle;
      }

    });
  </script>
</dom-module>
