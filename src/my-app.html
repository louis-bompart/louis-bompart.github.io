<html><head><link rel="import" href="../bower_components/polymer/polymer.html">
<link rel="import" href="../bower_components/app-layout/app-drawer/app-drawer.html">
<link rel="import" href="../bower_components/app-layout/app-drawer-layout/app-drawer-layout.html">
<link rel="import" href="../bower_components/app-layout/app-header/app-header.html">
<link rel="import" href="../bower_components/app-layout/app-header-layout/app-header-layout.html">
<link rel="import" href="../bower_components/app-layout/app-scroll-effects/app-scroll-effects.html">
<link rel="import" href="../bower_components/app-layout/app-toolbar/app-toolbar.html">
<link rel="import" href="../bower_components/app-route/app-location.html">
<link rel="import" href="../bower_components/app-route/app-route.html">
<link rel="import" href="../bower_components/iron-pages/iron-pages.html">
<link rel="import" href="../bower_components/iron-selector/iron-selector.html">
<link rel="import" href="../bower_components/paper-item/paper-item.html">
<link rel="import" href="../bower_components/paper-listbox/paper-listbox.html">
<link rel="import" href="../bower_components/paper-icon-button/paper-icon-button.html">
<link rel="import" href="../bower_components/iron-ajax/iron-ajax.html">
<link rel="import" href="theme.html">

</head><body><dom-module id="my-app">
  <template>
    <style>
      :host {
        display: block;
        @apply(--paper-font-common-base);
      }

      body {
        @apply(--paper-font-common-base);
        color : var(--menu-text-color);
        background-color: var(--primary-color);
      }

      app-header {
        @apply(--paper-font-style);
        color: var(--menu-text-color);
        background-color: var(--primary-color);
      }

      app-drawer {
        --app-drawer-content-container: {
          background-color: var(--dark-primary-color);
          color: var(--menu-text-color);
        }
      }

      .navigator {
        --paper-listbox-background-color: var(--dark-primary-color);
      }

      paper-item {
        color: var(--menu-text-color);
      }

    </style>
    <iron-ajax url="../data/pages.json" auto="" last-response="{{pages}}"></iron-ajax>
    <app-location route="{{route}}"></app-location>
    <app-route route="{{route}}" pattern="/:page" data="{{routeData}}" tail="{{subroute}}"></app-route>

    <app-drawer-layout fullbleed="">
      
      <app-drawer>
        <app-toolbar>Menu</app-toolbar>
        <paper-listbox class="navigator" selected="{{routeData.page}}" attr-for-selected="name" role="listbox" fallback-selection="home">
          <template is="dom-repeat" items="[[pages]]">
            <paper-item name="[[item.name]]">{{item.title}}</paper-item>
          </template>
          
          <paper-item name="error-404" hidden=""></paper-item>
        </paper-listbox>
      </app-drawer>

      
      <app-header-layout has-scrolling-region="">
        <app-header condenses="" reveals="" effects="waterfall resize-title">
          <app-toolbar>
            <paper-icon-button icon="menu" drawer-toggle=""></paper-icon-button>
            <div condensed-title="">{{currentTitle}}</div>
          </app-toolbar>
          <app-toolbar>
            <div main-title="">{{currentTitle}}</div>
          </app-toolbar>
        </app-header>
        <iron-pages id="pages" selected="[[page]]" attr-for-selected="name" selected-item="{{selectedPage}}" fallback-selection="error-404" role="main">
          <home-view name="home"></home-view>
          <error-404-view name="error-404"></error-404-view>
          <about-view name="about"></about-view>
          <licenses-view name="licenses"></licenses-view>
        </iron-pages>
      </app-header-layout>
    </app-drawer-layout>
  </template>

  <script>Polymer({is:"my-app",properties:{pages:{type:Array,value:[],observer:"_pagesLoaded"},page:{type:String,reflectToAttribute:!0,observer:"_pageChanged"},currentTitle:String},observers:["_routePageChanged(routeData.page)"],_pagesLoaded:function(){this._updateTitle()},_routePageChanged:function(e){this.page=e||"home"},_pageChanged:function(e){var t=this.resolveUrl(e+"-view.html");this.importHref(t,null,this._showPage404,!0),void 0!=this.pages&&this._updateTitle()},_updateTitle:function(){for(var e=0;e<this.pages.length;e++)this.pages[e].name===this.page&&(this.currentTitle=this.pages[e].title)},_showPage404:function(){this.page="error-404",this.set("route.path","/error-404/")}});</script>
</dom-module>
</body></html>
