<link rel="import" href="../bower_components/polymer/polymer.html">
<link rel="import" href="../bower_components/app-layout/app-grid/app-grid-style.html">
<link rel="import" href="../bower_components/paper-styles/typography.html">
<link rel="import" href="../bower_components/paper-icon-button/paper-icon-button.html">
<link rel="import" href="../bower_components/iron-icons/iron-icons.html">
<link rel="import" href="../bower_components/paper-material/paper-material.html">
<link rel="import" href="../bower_components/paper-icon-button/paper-icon-button.html">
<link rel="import" href="../bower_components/paper-card/paper-card.html">
<link rel="import" href="theme.html">


<dom-module id="seascrap-view">
  <template>
    <style include="app-grid-style">
      :host {
        display: block;
        @apply(--paper-font-common-base);
        --app-grid-columns: 2;
        --app-grid-gutter: 10px;
        --app-grid-expandible-item-columns: 2;
        background-color: var(--primary-background-color);
      }

      body {
        @apply(--paper-font-common-base);
        color : var(--primary-text-color);
        background-color: var(--primary-color);
      }
      paper-material {
        background-color: var(--elevation-1-background-color);
        color: var(--primary-text-color);
        padding-left: 16px;
        padding-right: 16px;
        padding-top: 24px;
        padding-bottom: 24px;
      }
      paper-card {
        background-color: var(--elevation-1-background-color);
        --paper-card-actions : {
          @apply(--layout-horizontal);
          @apply(--layout-justified);
        }
      }

      .big-item {
        @apply(--app-grid-expandible-item);
      }
      .title {
        @apply(--app-grid-expandible-item);
        @apply(--layout-horizontal);
        @apply(--layout-center-justified);
      }
      @media (max-width: 799px) {
        :host {
          --app-grid-columns: 1;
          --app-grid-gutter: 5px;
          --app-grid-expandible-item-columns: 1;
        }
      }
    </style>
    <div class="app-grid">
      <paper-material elevation="1">
        <h2>Introduction</h2>
        <p align="justify">Sea Scraps is an adventure-RPG game which takes place in a post-post-apocalyptic world. Embodies Mike and his crew on a formidable adventure on and below the seas, looking for treasures and mysteries of an ancient era.</p>
        <p align="justify">This game is a student project realised during a game conception course at UQAC in Fall 2016. I spend most of my times on this project on revision control and on AI development on the navigation/exploration phases.</p>
      </paper-material>
      <paper-material elevation="1">
        <h2>Context</h2>
        <p align="justify">The game uses a hexagonal grid during this phases, my goal was to provide the most user-friendly way for a user to find a path to its chosen destination. To do so, I used some tricks we learned in AI development for video games, like steering behaviours. Indeed, to 'smooth' the movements of player and AI controlled tokens, I choose to rely mostly on multiple things :</p>
        <ul>
          <li>A queue of waypoints, either designed by the game developer for AI controlled tokens or generated by the player inputs.</li>
          <li>A calculated path to the next waypoint of the token, computed by a custom-made A-Star algorithm (more on that later).</li>
          <li>An invisible "guiding flag" that the token blindly follows.</li>
        </ul>
      </paper-material>
      <paper-material>
        <h2>How the list of waypoints are generated?</h2>
        <p align="justifiy">For AI tokens, game designers just have to push it to the queue of waypoints with a simple drag & drop in Unity Editor. For the player's tokens, every tile touched by the player while he traces his path are added to this queue, then the path is a bit improved (loop removed for example).</p>
      </paper-material>
      <paper-material>
        <h2>How is the path computed?</h2>
        <p align="justifiy">Well, thanks to a basic A-star algorithm, with some simple specific setting. But, of course, to be used, it needs a graph. The graph is quite obvious:</p>
        <p align="justify">Its nodes are the tiles of the level (non-passable areas are not tiled) and its edges well are induced by the position of the tiles: each tile are linked to all its direct neighbours.</p>
      </paper-material>
    </div>
  </template>

  <script>
    Polymer({

      is: 'seascrap-view',
      properties: {
        pageTitle: {
          type: String,
          value: 'Home',
          readOnly: true
        }
      },
      attached: function () {
        this.currentTitle=this.pageTitle;
        this._updateGridStyles = this._updateGridStyles || function() {
          this.updateStyles();
        }.bind(this);
        window.addEventListener('resize', this._updateGridStyles);
      },
      detached: function() {
        window.removeEventListener('resize', this._updateGridStyles);
      }
    });
  </script>
</dom-module>
